basePath: /service
definitions:
  protocol.Response:
    properties:
      data:
        description: Response data
      message:
        description: |-
          Error message, it is recommended to fill in a human-readable error message when the action fails to execute,
          or an empty string when it succeeds.
        type: string
      retcode:
        description:
          The return code, which must conform to the return code rules
          defined later on this page
        type: string
      status:
        allOf:
          - $ref: "#/definitions/protocol.ResponseStatus"
        description: |-
          Execution status (success or failure), must be one of ok and failed,
          indicating successful and unsuccessful execution, respectively.
    type: object
  protocol.ResponseStatus:
    enum:
      - ok
      - failed
    type: string
    x-enum-varnames:
      - Success
      - Failed
  types.KV:
    additionalProperties: {}
    type: object
host: localhost:6060
info:
  contact: {}
  description: Flowbot Chatbot API
  license:
    name: GPL 3.0
    url: https://github.com/flowline-io/flowbot/blob/master/LICENSE
  title: Flowbot API
  version: "1.0"
paths:
  /example/create:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/protocol.Response"
      summary: Create example item
      tags:
        - example
  /example/delete:
    delete:
      parameters:
        - description: item id
          in: query
          name: id
          required: true
          type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/protocol.Response"
      summary: Delete example item
      tags:
        - example
  /example/example:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      summary: Show example
      tags:
        - example
  /example/get:
    get:
      parameters:
        - description: item id
          in: query
          name: id
          required: true
          type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/protocol.Response"
      summary: Get example item
      tags:
        - example
  /example/health:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/protocol.Response"
      summary: Example health check
      tags:
        - example
  /example/webhook/example:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "202":
          description: Accepted
          schema:
            type: string
      summary: Receive example webhook events
      tags:
        - example
  /server/stacktrace:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      security:
        - ApiKeyAuth: []
      summary: get server or goroutines stacktrace
      tags:
        - dev
  /server/upload:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      security:
        - ApiKeyAuth: []
      summary: upload PicGO upload api
      tags:
        - dev
schemes:
  - http
securityDefinitions:
  ApiKeyAuth:
    description: access token
    in: header
    name: X-AccessToken
    type: apiKey
swagger: "2.0"
