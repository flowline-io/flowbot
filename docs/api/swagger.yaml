basePath: /service
definitions:
  ability.EventRef:
    properties:
      entity_id:
        type: string
      event_id:
        type: string
      event_type:
        type: string
    type: object
  ability.InvokeResult:
    properties:
      capability:
        $ref: "#/definitions/hub.CapabilityType"
      data: {}
      events:
        items:
          $ref: "#/definitions/ability.EventRef"
        type: array
      meta:
        additionalProperties: {}
        type: object
      operation:
        type: string
      page:
        $ref: "#/definitions/ability.PageInfo"
      text:
        type: string
    type: object
  ability.PageInfo:
    properties:
      has_more:
        type: boolean
      limit:
        type: integer
      next_cursor:
        type: string
      prev_cursor:
        type: string
      total:
        type: integer
    type: object
  hub.CapabilityType:
    enum:
      - bookmark
      - archive
      - reader
      - kanban
      - finance
      - infra
      - shell_history
      - notify
    type: string
    x-enum-varnames:
      - CapBookmark
      - CapArchive
      - CapReader
      - CapKanban
      - CapFinance
      - CapInfra
      - CapShellHistory
      - CapNotify
  protocol.Response:
    properties:
      data:
        description: Response data
      message:
        description: |-
          Error message, it is recommended to fill in a human-readable error message when the action fails to execute,
          or an empty string when it succeeds.
        type: string
      retcode:
        description:
          The return code, which must conform to the return code rules
          defined later on this page
        type: string
      status:
        allOf:
          - $ref: "#/definitions/protocol.ResponseStatus"
        description: |-
          Execution status (success or failure), must be one of ok and failed,
          indicating successful and unsuccessful execution, respectively.
    type: object
  protocol.ResponseStatus:
    enum:
      - ok
      - failed
    type: string
    x-enum-varnames:
      - Success
      - Failed
  reader.createFeedRequest:
    properties:
      category_id:
        type: integer
      feed_url:
        maxLength: 2048
        type: string
    required:
      - feed_url
    type: object
  reader.updateEntriesRequest:
    properties:
      entry_ids:
        items:
          type: integer
        maxItems: 1000
        minItems: 1
        type: array
      status:
        enum:
          - read
          - unread
          - removed
        type: string
    required:
      - entry_ids
      - status
    type: object
  types.KV:
    additionalProperties: {}
    type: object
host: localhost:6060
info:
  contact: {}
  description: Flowbot Chatbot API
  license:
    name: GPL 3.0
    url: https://github.com/flowline-io/flowbot/blob/master/LICENSE
  title: Flowbot API
  version: "1.0"
paths:
  /dev/example:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      summary: Show example
      tags:
        - dev
  /server/stacktrace:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      security:
        - ApiKeyAuth: []
      summary: get server or goroutines stacktrace
      tags:
        - dev
  /server/upload:
    post:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      security:
        - ApiKeyAuth: []
      summary: upload PicGO upload api
      tags:
        - dev
  /service/bookmark:
    get:
      consumes:
        - application/json
      parameters:
        - description: page size
          in: query
          name: limit
          type: integer
        - description: pagination cursor
          in: query
          name: cursor
          type: string
        - description: include archived
          in: query
          name: archived
          type: boolean
        - description: favourited only
          in: query
          name: favourited
          type: boolean
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/ability.InvokeResult"
                type: object
      security:
        - ApiKeyAuth: []
      summary: List bookmarks
      tags:
        - bookmark
    post:
      consumes:
        - application/json
      parameters:
        - description: bookmark URL
          in: body
          name: body
          required: true
          schema:
            properties:
              url:
                type: string
            type: object
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/ability.InvokeResult"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Create a new bookmark
      tags:
        - bookmark
  /service/bookmark/{id}:
    get:
      consumes:
        - application/json
      parameters:
        - description: bookmark ID
          in: path
          name: id
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/ability.InvokeResult"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Get bookmark by ID
      tags:
        - bookmark
    patch:
      consumes:
        - application/json
      parameters:
        - description: bookmark ID
          in: path
          name: id
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/ability.InvokeResult"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Archive bookmark
      tags:
        - bookmark
  /service/bookmark/{id}/tags:
    delete:
      consumes:
        - application/json
      parameters:
        - description: bookmark ID
          in: path
          name: id
          required: true
          type: string
        - description: tag names
          in: body
          name: body
          required: true
          schema:
            items:
              type: string
            type: array
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/ability.InvokeResult"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Detach tags from a bookmark
      tags:
        - bookmark
    post:
      consumes:
        - application/json
      parameters:
        - description: bookmark ID
          in: path
          name: id
          required: true
          type: string
        - description: tag names
          in: body
          name: body
          required: true
          schema:
            items:
              type: string
            type: array
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/ability.InvokeResult"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Attach tags to a bookmark
      tags:
        - bookmark
  /service/bookmark/check-url:
    get:
      consumes:
        - application/json
      parameters:
        - description: URL to check
          in: query
          name: url
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/ability.InvokeResult"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Check if URL exists in bookmarks
      tags:
        - bookmark
  /service/bookmark/search:
    get:
      consumes:
        - application/json
      parameters:
        - description: search query
          in: query
          name: q
          required: true
          type: string
        - description: sort order
          in: query
          name: sort_order
          type: string
        - description: page size
          in: query
          name: limit
          type: integer
        - description: pagination cursor
          in: query
          name: cursor
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/ability.InvokeResult"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Search bookmarks
      tags:
        - bookmark
  /service/reader:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/protocol.Response"
      security:
        - ApiKeyAuth: []
      summary: List all feeds
      tags:
        - reader
    post:
      consumes:
        - application/json
      parameters:
        - description: feed data
          in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/reader.createFeedRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/protocol.Response"
      security:
        - ApiKeyAuth: []
      summary: Create a new feed
      tags:
        - reader
  /service/reader/entries:
    get:
      consumes:
        - application/json
      parameters:
        - description: status filter (read, unread, removed)
          in: query
          name: status
          type: string
        - description: filter by feed ID
          in: query
          name: feed_id
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/protocol.Response"
      security:
        - ApiKeyAuth: []
      summary: List entries
      tags:
        - reader
    patch:
      consumes:
        - application/json
      parameters:
        - description: entry IDs and status
          in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/reader.updateEntriesRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/protocol.Response"
      security:
        - ApiKeyAuth: []
      summary: Update entries status
      tags:
        - reader
  /user/bookmark:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      security:
        - ApiKeyAuth: []
      summary: get user bookmark list
      tags:
        - user
  /user/dashboard:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Show dashboard
      tags:
        - user
  /user/kanban:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      security:
        - ApiKeyAuth: []
      summary: get user kanban list
      tags:
        - user
  /user/metrics:
    get:
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/protocol.Response"
              - properties:
                  data:
                    $ref: "#/definitions/types.KV"
                type: object
      security:
        - ApiKeyAuth: []
      summary: Show metrics
      tags:
        - user
schemes:
  - http
securityDefinitions:
  ApiKeyAuth:
    description: access token
    in: header
    name: X-AccessToken
    type: apiKey
swagger: "2.0"
