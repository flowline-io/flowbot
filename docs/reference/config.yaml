---
# Flowbot config template.
# Daily path is short (listen + postgres + redis + modules.web.auth).
# platform/vendors blocks below remain exhaustive stubs; pool/media/http knobs are
# optional (see docs/reference/config-reference.md).

# Server listening address and port
listen: ":6060"
# API path prefix (default "/")
# api_path: "/"

# HTTP boundary hardening — entire block optional (rate limit defaults: 200 / 10s).
# http:
#   cors:
#     allow_origins: []
#   rate_limit:
#     max: 200
#     expiration: 10s
#   tls_behind_proxy: false
#   # Trust X-Forwarded-For only from these proxy IPs/CIDRs (login rate limit, etc.).
#   trusted_proxies:
#     - 127.0.0.1/32
#
# retention:
#   data_events_days: 90  # 0 / omit = keep forever; also purges related pipeline/outbox history

# Media uploads — omit to disable. Zero max_size/gc_* use code defaults (100MiB/60s/100).
# media:
#   use_handler: fs
#   handlers:
#     fs:
#       upload_dir: uploads
#   # use_handler: minio
#   # handlers:
#   #   minio:
#   #     access_key_id: ...
#   #     secret_access_key: ...
#   #     endpoint: "127.0.0.1:9000"
#   #     bucket: ...
#   #     serve_url: "http://127.0.0.1:9000"

# PostgreSQL (required). Pool overrides optional — see config-reference.md.
postgres:
  dsn: postgres://username:password@localhost/flowbot?sslmode=disable
  # max_results: 1024
  # max_open_conns: 25
  # max_idle_conns: 5
  # conn_max_lifetime: 300
  # sql_timeout: 10
  # conn_max_idle_time: 60
  # pool_health_check_interval: 30
  # pool_health_check_timeout: 5

# Redis (required). Password must be non-empty in the URL.
redis:
  url: "redis://:flowbot@127.0.0.1:6379/0"
  # pool_size: 20
  # min_idle_conns: 5
  # max_retries: 3
  # dial_timeout: 5s
  # read_timeout: 60s
  # write_timeout: 60s

# Logging — omit for info / console defaults.
log:
  level: info
  # caller: false
  # stackTrace: false
  # jsonOutput: false
  # fileLog: false

# Executor — optional; expand when using docker/shell/machine runtimes.
# executor:
#   type: "docker"

# Metrics — prefer false unless VictoriaMetrics (or similar) is running.
metrics:
  enabled: false
  # endpoint: "http://127.0.0.1:8428"
  # bearer_token: ""

# Pyroscope continuous profiling — enable only when needed.
profiling:
  enabled: false
  # server_address: "http://127.0.0.1:4040"
  # service_name: "flowbot"
  # environment: "development"
  # profile_types: [cpu, alloc_objects, alloc_space, inuse_objects, inuse_space, goroutines]

# Search URL base map
search:
  url_base_map:
    karakeep: "http://127.0.0.1:8000"
    kanboard: "http://127.0.0.1:8001"
    gitea: "http://127.0.0.1:8002"
    drone: "http://127.0.0.1:8035"

# Model configuration
models:
  - provider: "openai" # openai, openai_compatible, gemini, anthropic
    base_url: "https://api.openai.com/v1"
    api_key: ""
    model_names:
      - "gpt-5.5-instant"
      - "gpt-5.5"

# Direct-message chat assistant agent
chat_agent:
  workspace: "/var/lib/flowbot/chat-workspace"
  run_timeout: 10m
  # stream_idle_timeout: 60s   # cancel stalled LLM streams; zero uses 60s default
  shell_timeout: 60s
  max_tool_output: 8192
  max_steps: 30
  # chat_model: "gpt-4o-mini"   # enables chat agent when set
  # tool_model: "gpt-4o"        # enables dual-model routing when set (same provider as chat_model)
  compaction:
    auto: true
    prune: true
    reserved: 10000
    keep_recent_tokens: 20000
    # Legacy keys (still supported): enabled, reserve_tokens
  # system_prompt: ""           # optional: replace default prompt entirely
  # append_system_prompt: ""    # optional: extra instructions appended to prompt
  # prompt_guidelines: []       # optional: extra guideline bullets
  # context_files:              # optional: defaults to AGENTS.md and README.md under workspace
  #   - AGENTS.md
  #   - README.md
  # subagent_max_depth: 1        # optional: cap nested task-tool delegation (default 1)
  # subagent_default_model: ""   # optional: model for subagents without an explicit model (default chat_model)
  # subagent_max_steps: 0        # optional: Observe-Think-Act limit per subagent run (default max_steps)
  llm_retry:
    max_attempts: 3
    initial_interval: 1s
    # max_interval: 30s
    # multiplier: 2.0
  sensors:
    lint_on_write: false         # observation-only lint log after write_file of *.go
  sandbox:
    enabled: false
    image: ghcr.io/flowline-io/flowbot-agent-sandbox:latest
    # network: none
    # memory: 512m
    # Flowbot CLI credentials injected into sandbox containers (not baked into the image).
    # server_url: "http://host.docker.internal:6060"  # URL reachable from inside the container
    # access_token: ""  # dedicated Hub access token; empty skips credential injection
  # web_search:
  #   api_key: ""  # SerpApi key (https://serpapi.com/search-api); required for web_search

# Flowbot instance configuration
flowbot:
  # External URL of this Flowbot instance
  url: ""
  # Chat channel path prefix
  channel_path: "/channels"
  # UI language: english, chinese
  language: "english"

# Homelab app scanner and discovery configuration
homelab:
  # Root directory for homelab files
  root: ""
  # Apps directory (defaults to <root>/apps)
  apps_dir: ""
  # Compose file name to look for (defaults to docker-compose.yaml)
  compose_file: ""
  # Runtime mode: none, docker_socket, ssh
  runtime:
    mode: "none"
    docker_socket: ""
    ssh_host: ""
    ssh_port: 22
    ssh_user: ""
    ssh_password: ""
    ssh_key: ""
    ssh_host_key: ""
  # Optional allowlist: only scan named apps when non-empty
  allowlist: []
  # Lifecycle operation permissions
  permissions:
    status: true
    logs: true
    start: false
    stop: false
    restart: false
    pull: false
    update: false
    exec: false
  # Endpoint and auth discovery configuration
  discovery:
    # Enable runtime HTTP probing of running containers
    probe_enabled: false
    # Per-request timeout for probe HTTP calls
    probe_timeout: "5s"
    # Maximum concurrent probe goroutines
    probe_concurrency: 4
    # Docker network names for container resolution (reserved)
    # probe_networks: []
    # Port resolution strategy: published, container, both
    probe_port_strategy: "published"
    # Enable service fingerprint matching
    fingerprint_enabled: true
    # When true, label-derived data overrides probe results
    label_priority: true

# Pipeline definitions are loaded from a separate pipelines.yaml file.
# See docs/reference/pipelines.yaml for the pipeline schema and examples.

# Notification templates and rules are managed via the Notifications UI
# (/service/web/notifications) and persisted in PostgreSQL. See docs/user-guide/notification-gateway.md.

# OpenTelemetry distributed tracing configuration
tracing:
  # Enable trace export
  enabled: false
  # OTLP HTTP endpoint
  endpoint: "http://127.0.0.1:4318/v1/traces"
  # Service name in traces
  service_name: "flowbot"
  # Environment tag: development, staging, production
  environment: "development"
  # Trace sampling rate (0.0 - 1.0)
  sample_rate: 1.0

# Platform integration configuration
platform:
  # Slack platform configuration
  slack:
    enabled: true
    app_id: ""
    client_id: ""
    client_secret: ""
    signing_secret: ""
    verification_token: ""
    app_token: ""
    bot_token: ""

  # Discord platform configuration
  discord:
    enabled: true
    app_id: ""
    public_key: ""
    client_id: ""
    client_secret: ""
    bot_token: ""

  # Tailchat platform configuration
  tailchat:
    enabled: true
    api_url: ""
    app_id: ""
    app_secret: ""
    # Shared secret for inbound /platform/tailchat (header X-Tailchat-Token). Required when enabled.
    webhook_token: ""

  # Telegram platform configuration
  telegram:
    enabled: true

# Module configuration list
modules:
  - name: web
    enabled: true
    auth:
      username: admin
      # Dev plaintext example only — change before any real deployment (min 12 chars).
      # Prefer password_hash (bcrypt cost >= 10) in production.
      password: "flowbot-dev-pass"
      # password_hash: "$2a$10$..."
      # cookie_secure defaults to true; brute_force defaults to enabled (omit both).
      # brute_force:
      #   enabled: false   # set false only to disable login lockout

# Third-party service configuration
vendors:
  # GitHub OAuth configuration
  github:
    id:
    secret:
  # Pocket configuration
  pocket:
    consumer_key: ""
  # Dropbox configuration
  dropbox:
    key: ""
    secret: ""
  # Transmission configuration
  transmission:
    endpoint: ""
  # Gitea configuration
  gitea:
    endpoint: ""
    token: ""
  # AdGuard Home configuration
  adguard_home:
    endpoint: ""
    username: ""
    password: ""
  # ArchiveBox configuration
  archivebox:
    endpoint: ""
    token: ""
  # Slash configuration
  slash:
    endpoint: ""
    token: ""
  # Karakeep configuration
  karakeep:
    endpoint: "http://127.0.0.1:8000/api/v1"
    api_key: ""
    webhook_token: "" # Bearer token for webhook verification
  # Safeline configuration
  safeline:
    endpoint: https://127.0.0.1:9443/api
    token: ""
  # Kanboard configuration
  kanboard:
    endpoint: ""
    username: ""
    password: ""
    webhook_token: ""
  # Wallos configuration
  wallos:
    endpoint: ""
    api_key: ""
  # Miniflux RSS reader configuration
  miniflux:
    endpoint: ""
    api_key: ""
    webhook_secret: ""
  # Memos notes (API token + inbound webhook query token)
  memos:
    # Instance origin only (e.g. http://127.0.0.1:5230); provider appends /api/v1/...
    endpoint: ""
    token: ""
    # Required for /webhook/provider/memos/events?token=TOKEN — empty rejects all deliveries
    webhook_token: ""
  # Firefly III configuration
  fireflyiii:
    endpoint: "http://127.0.0.1:8283/api"
    token: ""
  # NocoDB configuration
  nocodb:
    endpoint: ""
    token: ""
  # Uptime Kuma configuration
  uptimekuma:
    endpoint: "http://127.0.0.1:8002"
    token: ""
  # Beszel host monitoring (PocketBase); prefer token, else email+password
  beszel:
    endpoint: ""
    token: ""
    email: ""
    password: ""
  # Traefik API (optional Basic auth)
  traefik:
    endpoint: ""
    username: ""
    password: ""
  # Grafana HTTP API
  grafana:
    endpoint: ""
    token: ""
  # Wakapi coding stats
  wakapi:
    endpoint: ""
    api_key: ""
  # Dozzle Docker logs (health/version only)
  dozzle:
    endpoint: ""
    username: ""
    password: ""
    token: ""
  # NetAlertX network device monitoring (Bearer API token)
  netalertx:
    endpoint: ""
    token: ""
  # Drone configuration
  drone:
    endpoint: ""
    token: ""
  # n8n configuration
  n8n:
    endpoint: ""
    api_key: ""
  # trilium configuration
  trilium:
    endpoint: ""
    token: ""

# Ability invocation — omit for defaults.
# ability:
#   event_pool:
#     size: 0
#     expiry_duration: "30s"
