---
# Server listening address and port
listen: ":6060"
# API path prefix
api_path: "/"

# HTTP boundary hardening (CORS, rate limit, HSTS)
http:
  # CORS Origin whitelist. Empty = do not reflect any Origin (same-origin Web UI / frp does not need CORS).
  cors:
    allow_origins: []
  # Global HTTP rate limiter (login brute_force is separate under modules.web.auth)
  rate_limit:
    max: 200
    expiration: 10s
  # Set true when serving HTTPS or behind a TLS-terminating proxy (enables HSTS).
  # HSTS is also enabled when modules.web.auth.cookie_secure is true (default).
  tls_behind_proxy: false

media:
  # Media storage handler type: fs(filesystem) or minio
  use_handler: fs
  # Maximum upload file size in bytes, default 100MB
  max_size: 104857600
  # Garbage collection period in seconds
  gc_period: 60
  # Block size for each garbage collection cycle
  gc_block_size: 100
  handlers:
    # File system storage configuration
    fs:
      # Upload directory path
      upload_dir: uploads
    # MinIO object storage configuration
    minio:
      access_key_id: your_s3_access_key_id
      secret_access_key: your_s3_secret_access_key
      region: s3 region, like us-east-2
      bucket: your_s3_bucket_name
      disable_ssl: true
      force_path_style: false
      endpoint: "127.0.0.1:9000"
      cors_origins:
        - "*"
      serve_url: "http://127.0.0.1:9000"

store_config:
  # Maximum number of query results
  max_results: 1024
  # Data storage adapter type
  use_adapter: postgres
  adapters:
    # PostgreSQL database configuration
    postgres:
      dsn: postgres://username:password@localhost/flowbot?sslmode=disable
      max_open_conns: 64
      max_idle_conns: 64
      conn_max_lifetime: 300
      sql_timeout: 10
      conn_max_idle_time: 60
      pool_health_check_interval: 30
      pool_health_check_timeout: 5

# Redis configuration
redis:
  host: 127.0.0.1
  port: 6379
  db: 0
  password:
  # Connection pool configuration (all optional — zero means go-redis default)
  # pool_size: 20            # max connections (default: 10*GOMAXPROCS)
  # min_idle_conns: 5        # min idle connections (default: 0)
  # max_retries: 3           # max retries on failure (default: 3)
  # min_retry_backoff: 8ms   # min backoff between retries (default: 8ms)
  # max_retry_backoff: 512ms # max backoff between retries (default: 512ms)
  # dial_timeout: 5s         # timeout for new connections (default: 5s)
  # read_timeout: 60s        # socket read timeout (default: 60s)
  # write_timeout: 60s       # socket write timeout (default: 60s)
  # pool_timeout: 61s        # wait timeout for pool connection (default: read_timeout + 1s)
  # conn_max_idle_time: 30m  # max idle time before closing (default: 30min)
  # conn_max_lifetime: 0     # max connection lifetime, 0 = no limit
  # pool_fifo: false         # FIFO instead of LIFO pool ordering

# Logging configuration
log:
  # Log level: debug, info, warn, error, fatal, panic
  level: info
  # Enable caller (file:line) info at all levels (always on at debug level)
  caller: false
  # Enable full stack traces on error logs
  stackTrace: false
  # Write JSON to stdout instead of human-readable console format
  jsonOutput: false
  # Enable file logging (writes to XDG config home by default)
  fileLog: false
  # Override default log file path
  # fileLogPath: /var/log/flowbot/flowbot.log
  # Per-module log levels
  # moduleLevel:
  #   pipeline: debug
  #   workflow: debug
  # Burst sampling for high-frequency log points
  # sampling:
  #   burst: 5
  #   period: 1
  # Log file rotation
  # rotation:
  #   maxSize: 100
  #   maxAge: 30
  #   maxBackups: 10
  #   compress: true

# Executor configuration
executor:
  # executor type: docker
  type: "docker"
  # Resource limits
  limits:
    cpus: ""
    memory: ""
  mounts:
    bind:
      allowed: true
  docker:
    config: ""
  shell:
    cmd:
      - ""
      - ""
    uid: ""
    gid: ""
  machine:
    host: ""
    port: 0
    username: ""
    password: ""
    host_key: ""

# Metrics configuration
metrics:
  enabled: true
  endpoint: "http://127.0.0.1:8428"
  # Optional dedicated scrape secret for GET /metrics (Authorization: Bearer ...).
  # If empty, require a valid access token with admin:metrics (or admin:*) scope.
  bearer_token: ""

# Pyroscope continuous profiling configuration
profiling:
  enabled: false
  server_address: "http://127.0.0.1:4040"
  service_name: "flowbot"
  environment: "development"
  profile_types:
    - "cpu"
    - "alloc_objects"
    - "alloc_space"
    - "inuse_objects"
    - "inuse_space"
    - "goroutines"
    - "mutex_count"
    - "mutex_duration"
    - "block_count"
    - "block_duration"

# Search URL base map
search:
  url_base_map:
    karakeep: "http://127.0.0.1:8000"
    kanboard: "http://127.0.0.1:8001"
    gitea: "http://127.0.0.1:8002"
    drone: "http://127.0.0.1:8035"

# Model configuration
models:
  - provider: "openai" # openai, openai_compatible, gemini, anthropic
    base_url: "https://api.openai.com/v1"
    api_key: ""
    model_names:
      - "gpt-5.5-instant"
      - "gpt-5.5"

# Direct-message chat assistant agent
chat_agent:
  workspace: "/var/lib/flowbot/chat-workspace"
  run_timeout: 10m
  # stream_idle_timeout: 60s   # cancel stalled LLM streams; zero uses 60s default
  shell_timeout: 60s
  max_tool_output: 8192
  max_steps: 30
  # chat_model: "gpt-4o-mini"   # enables chat agent when set
  # tool_model: "gpt-4o"        # enables dual-model routing when set (same provider as chat_model)
  compaction:
    auto: true
    prune: true
    reserved: 10000
    keep_recent_tokens: 20000
    # Legacy keys (still supported): enabled, reserve_tokens
  # system_prompt: ""           # optional: replace default prompt entirely
  # append_system_prompt: ""    # optional: extra instructions appended to prompt
  # prompt_guidelines: []       # optional: extra guideline bullets
  # context_files:              # optional: defaults to AGENTS.md and README.md under workspace
  #   - AGENTS.md
  #   - README.md
  # subagent_max_depth: 1        # optional: cap nested task-tool delegation (default 1)
  # subagent_default_model: ""   # optional: model for subagents without an explicit model (default chat_model)
  # subagent_max_steps: 0        # optional: Observe-Think-Act limit per subagent run (default max_steps)
  llm_retry:
    max_attempts: 3
    initial_interval: 1s
    # max_interval: 30s
    # multiplier: 2.0
  sensors:
    lint_on_write: false         # observation-only lint log after write_file of *.go
  ability_tools: []              # each entry requires readonly: true
  sandbox:
    enabled: false
    image: ghcr.io/flowline-io/flowbot-agent-sandbox:latest
    # network: none
    # memory: 512m

# Flowbot instance configuration
flowbot:
  # External URL of this Flowbot instance
  url: ""
  # Chat channel path prefix
  channel_path: "/channels"
  # UI language: english, chinese
  language: "english"

# Homelab app scanner and discovery configuration
homelab:
  # Root directory for homelab files
  root: ""
  # Apps directory (defaults to <root>/apps)
  apps_dir: ""
  # Compose file name to look for (defaults to docker-compose.yaml)
  compose_file: ""
  # Runtime mode: none, docker_socket, ssh
  runtime:
    mode: "none"
    docker_socket: ""
    ssh_host: ""
    ssh_port: 22
    ssh_user: ""
    ssh_password: ""
    ssh_key: ""
    ssh_host_key: ""
  # Optional allowlist: only scan named apps when non-empty
  allowlist: []
  # Lifecycle operation permissions
  permissions:
    status: true
    logs: true
    start: false
    stop: false
    restart: false
    pull: false
    update: false
    exec: false
  # Endpoint and auth discovery configuration
  discovery:
    # Enable runtime HTTP probing of running containers
    probe_enabled: false
    # Per-request timeout for probe HTTP calls
    probe_timeout: "5s"
    # Maximum concurrent probe goroutines
    probe_concurrency: 4
    # Docker network names for container resolution (reserved)
    # probe_networks: []
    # Port resolution strategy: published, container, both
    probe_port_strategy: "published"
    # Enable service fingerprint matching
    fingerprint_enabled: true
    # When true, label-derived data overrides probe results
    label_priority: true

# Pipeline definitions are loaded from a separate pipelines.yaml file.
# See docs/reference/pipelines.yaml for the pipeline schema and examples.

# Notification gateway configuration
notify:
  # Notification message templates indexed by ID
  templates: []
    # - id: ""
    #   name: ""
    #   description: ""
    #   default_format: "markdown"
    #   default_template: ""
    #   overrides:
    #     - channel: ""
    #       format: ""
    #       template: ""
  # Notification filtering and aggregation rules
  rules: []
    # - id: ""
    #   action: "throttle" # throttle, aggregate, mute, drop
    #   match:
    #     event: ""
    #     channel: ""
    #   condition: ""
    #   priority: 0
    #   params:
    #     window: "60s"
    #     limit: 5
    #     digest_template_id: ""
    #     delayed_send: false

# OpenTelemetry distributed tracing configuration
tracing:
  # Enable trace export
  enabled: false
  # OTLP HTTP endpoint
  endpoint: "http://127.0.0.1:4318/v1/traces"
  # Service name in traces
  service_name: "flowbot"
  # Environment tag: development, staging, production
  environment: "development"
  # Trace sampling rate (0.0 - 1.0)
  sample_rate: 1.0

# Platform integration configuration
platform:
  # Slack platform configuration
  slack:
    enabled: true
    app_id: ""
    client_id: ""
    client_secret: ""
    signing_secret: ""
    verification_token: ""
    app_token: ""
    bot_token: ""

  # Discord platform configuration
  discord:
    enabled: true
    app_id: ""
    public_key: ""
    client_id: ""
    client_secret: ""
    bot_token: ""

  # Tailchat platform configuration
  tailchat:
    enabled: true
    api_url: ""
    app_id: ""
    app_secret: ""
    # Shared secret for inbound /platform/tailchat (header X-Tailchat-Token). Required when enabled.
    webhook_token: ""

  # Telegram platform configuration
  telegram:
    enabled: true

# Module configuration list
modules:
  - name: web
    enabled: true
    auth:
      username: admin
      # Dev plaintext example only — change before any real deployment (min 12 chars).
      # Prefer password_hash (bcrypt cost >= 10) in production.
      password: "flowbot-dev-pass"
      # password_hash: "$2a$10$..."
      # Set Secure on accessToken cookie (default true for HTTPS / frp deployments)
      cookie_secure: true
      # Brute force protection for login
      brute_force:
        enabled: true
        max_attempts: 5          # progressive delay starts at this count
        lockout_attempts: 10     # full lockout after this many failures
        lockout_duration: 15m    # how long the lockout lasts
        window_duration: 15m     # sliding window for counting attempts
  # Reference / demo module — keep disabled unless intentionally testing adapters
  - name: example
    enabled: false
    environment: ""

# Third-party service configuration
vendors:
  # GitHub OAuth configuration
  github:
    id:
    secret:
  # Pocket configuration
  pocket:
    consumer_key: ""
  # Dropbox configuration
  dropbox:
    key: ""
    secret: ""
  # Transmission configuration
  transmission:
    endpoint: ""
  # Gitea configuration
  gitea:
    endpoint: ""
    token: ""
  # AdGuard Home configuration
  adguard_home:
    endpoint: ""
    username: ""
    password: ""
  # ArchiveBox configuration
  archivebox:
    endpoint: ""
    token: ""
  # Slash configuration
  slash:
    endpoint: ""
    token: ""
  # Karakeep configuration
  karakeep:
    endpoint: "http://127.0.0.1:8000/api/v1"
    api_key: ""
    webhook_token: "" # Bearer token for webhook verification
  # Safeline configuration
  safeline:
    endpoint: https://127.0.0.1:9443/api
    token: ""
  # Kanboard configuration
  kanboard:
    endpoint: ""
    username: ""
    password: ""
    webhook_token: ""
  # Wallos configuration
  wallos:
    endpoint: ""
    api_key: ""
  # Miniflux RSS reader configuration
  miniflux:
    endpoint: ""
    api_key: ""
    webhook_secret: ""
  # Memos notes (API token + inbound webhook Bearer token)
  memos:
    endpoint: ""
    token: ""
    # Required for /webhook/provider/memos/events — empty rejects all deliveries
    webhook_token: ""
  # Firefly III configuration
  fireflyiii:
    endpoint: "http://127.0.0.1:8283/api"
    token: ""
  # Uptime Kuma configuration
  uptimekuma:
    endpoint: "http://127.0.0.1:8002"
    token: ""
  # Drone configuration
  drone:
    endpoint: ""
    token: ""
  # n8n configuration
  n8n:
    endpoint: ""
    api_key: ""

# Ability invocation configuration
ability:
  event_pool:
    # Max concurrent event emission workers (0 = ants default)
    size: 0
    # Idle worker eviction duration
    expiry_duration: "30s"
