---
# Server listening address and port
listen: ":6060"
# API path prefix
api_path: "/"
# Enable dev mode features (e.g., dev-login endpoint)
dev_mode: false

media:
  # Media storage handler type: fs(filesystem) or minio
  use_handler: fs
  # Maximum upload file size in bytes, default 100MB
  max_size: 104857600
  # Garbage collection period in seconds
  gc_period: 60
  # Block size for each garbage collection cycle
  gc_block_size: 100
  handlers:
    # File system storage configuration
    fs:
      # Upload directory path
      upload_dir: uploads
    # MinIO object storage configuration
    minio:
      access_key_id: your_s3_access_key_id
      secret_access_key: your_s3_secret_access_key
      region: s3 region, like us-east-2
      bucket: your_s3_bucket_name
      disable_ssl: true
      force_path_style: false
      endpoint: "127.0.0.1:9000"
      cors_origins:
        - "*"
      serve_url: "http://127.0.0.1:9000"

store_config:
  # Maximum number of query results
  max_results: 1024
  # Data storage adapter type
  use_adapter: mysql
  adapters:
    # MySQL database configuration
    mysql:
      dsn: root:password@tcp(localhost)/flowbot?parseTime=true&collation=utf8mb4_unicode_ci
      max_open_conns: 64
      max_idle_conns: 64
      # Maximum connection lifetime in seconds
      conn_max_lifetime: 60
      # SQL query timeout in seconds
      sql_timeout: 10

# Redis configuration
redis:
  host: 127.0.0.1
  port: 6379
  db: 0
  password:

# Logging configuration
log:
  # Log level: debug, info, warn, error, fatal, panic
  level: info
  # Enable caller (file:line) info at all levels (always on at debug level)
  caller: false
  # Enable full stack traces on error logs
  stackTrace: false
  # Write JSON to stdout instead of human-readable console format
  jsonOutput: false
  # Enable file logging (writes to XDG config home by default)
  fileLog: false
  # Override default log file path
  # fileLogPath: /var/log/flowbot/flowbot.log
  # Per-module log levels
  # moduleLevel:
  #   pipeline: debug
  #   workflow: debug
  # Burst sampling for high-frequency log points
  # sampling:
  #   burst: 5
  #   period: 1
  # Log file rotation
  # rotation:
  #   maxSize: 100
  #   maxAge: 30
  #   maxBackups: 10
  #   compress: true

# Executor configuration
executor:
  # executor type: docker
  type: "docker"
  # Resource limits
  limits:
    cpus: ""
    memory: ""
  mounts:
    bind:
      allowed: true
  docker:
    config: ""
  shell:
    cmd:
      - ""
      - ""
    uid: ""
    gid: ""
  machine:
    host: ""
    port: 0
    username: ""
    password: ""
    host_key: ""

# Metrics configuration
metrics:
  enabled: true
  endpoint: "http://127.0.0.1:8428"

# Search service configuration
search:
  enabled: true
  endpoint: "http://127.0.0.1:7700"
  master_key: ""
  data_index: "data"
  url_base_map:
    karakeep: "http://127.0.0.1:8000"
    kanboard: "http://127.0.0.1:8001"
    gitea: "http://127.0.0.1:8002"
    drone: "http://127.0.0.1:8035"

# Alarm configuration
alarm:
  enabled: true
  # Alarm filter rules
  filter: ""
  # Slack webhook URL
  slack_webhook: ""

# Model configuration
models:
  - provider: "openai" # openai, openai-compatible
    base_url: "https://api.openai.com/v1"
    api_key: ""
    model_names:
      - "chatgpt-4"
      - "chatgpt-3.5-turbo"

# Agent configuration
agents:
  - name: "chat"
    enabled: true
    model: ""
  - name: "react"
    enabled: true
    model: ""
  - name: "repo-review-comment"
    enabled: true
    model: ""
  - name: "news-summary"
    enabled: true
    model: ""
  - name: "bill-classify"
    enabled: true
    model: ""
  - name: "extract-tags"
    enabled: true
    model: ""
  - name: "similar-tags"
    enabled: true
    model: ""

# Rule engine configuration
rule_engine:
  rules_path: "/opt/app/rules"

# Flowbot configuration
flowbot:
  url: ""
  lang: "english"

# Homelab app scanner and discovery configuration
homelab:
  # Root directory for homelab files
  root: ""
  # Apps directory (defaults to <root>/apps)
  apps_dir: ""
  # Compose file name to look for (defaults to docker-compose.yaml)
  compose_file: ""
  # Runtime mode: none, docker_socket, ssh
  runtime:
    mode: "none"
    docker_socket: ""
    ssh_host: ""
    ssh_port: 22
    ssh_user: ""
    ssh_password: ""
    ssh_key: ""
    ssh_host_key: ""
  # Optional allowlist: only scan named apps when non-empty
  allowlist: []
  # Lifecycle operation permissions
  permissions:
    status: true
    logs: true
    start: false
    stop: false
    restart: false
    pull: false
    update: false
    exec: false
  # Endpoint and auth discovery configuration
  discovery:
    # Enable runtime HTTP probing of running containers
    probe_enabled: false
    # Per-request timeout for probe HTTP calls
    probe_timeout: "5s"
    # Maximum concurrent probe goroutines
    probe_concurrency: 4
    # Docker network names for container resolution (reserved)
    # probe_networks: []
    # Port resolution strategy: published, container, both
    probe_port_strategy: "published"
    # Enable service fingerprint matching
    fingerprint_enabled: true
    # When true, label-derived data overrides probe results
    label_priority: true

# Platform integration configuration
platform:
  # Slack platform configuration
  slack:
    enabled: true
    app_id: ""
    client_id: ""
    client_secret: ""
    signing_secret: ""
    verification_token: ""
    app_token: ""
    bot_token: ""

  # Discord platform configuration
  discord:
    enabled: true
    app_id: ""
    public_key: ""
    client_id: ""
    client_secret: ""
    bot_token: ""

  # Tailchat platform configuration
  tailchat:
    enabled: true
    api_url: ""
    app_id: ""
    app_secret: ""

  # Telegram platform configuration
  telegram:
    enabled: true

# Bot configuration list
bots:
  - name: dev
    enabled: true
    environment: development

# Third-party service configuration
vendors:
  # GitHub OAuth configuration
  github:
    id:
    secret:
  # Pocket configuration
  pocket:
    consumer_key: ""
  # Dropbox configuration
  dropbox:
    key: ""
    secret: ""
  # Transmission configuration
  transmission:
    endpoint: ""
  # Gitea configuration
  gitea:
    endpoint: ""
    token: ""
  # AdGuard Home configuration
  adguard_home:
    endpoint: ""
    username: ""
    password: ""
  # ArchiveBox configuration
  archivebox:
    endpoint: ""
    token: ""
  # Slash configuration
  slash:
    endpoint: ""
    token: ""
  # Karakeep configuration
  karakeep:
    endpoint: "http://127.0.0.1:8000/api/v1"
    api_key: ""
  # Safeline configuration
  safeline:
    endpoint: https://127.0.0.1:9443/api
    token: ""
  # Kanboard configuration
  kanboard:
    endpoint: ""
    username: ""
    password: ""
    webhook_token: ""
  # Wallos configuration
  wallos:
    endpoint: ""
    api_key: ""
  # Miniflux RSS reader configuration
  miniflux:
    endpoint: ""
    api_key: ""
  # Firefly III configuration
  fireflyiii:
    endpoint: "http://127.0.0.1:8283/api"
    token: ""
  # Uptime Kuma configuration
  uptimekuma:
    endpoint: "http://127.0.0.1:8002"
    token: ""
  # Drone configuration
  drone:
    endpoint: ""
    token: ""
  # n8n configuration
  n8n:
    endpoint: ""
    api_key: ""
