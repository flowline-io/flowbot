name: echo_mapper
describe: "Minimal mapper workflow for smoke-testing apply/run and inputs"
enabled: true
resumable: false

inputs:
  - name: message
    type: string
    required: true
    description: "Message to echo"
  - name: tag
    type: string
    required: false
    default: "cli-demo"
    description: "Optional tag"

triggers:
  - type: manual
    enabled: true

pipeline:
  - build_payload

tasks:
  - id: build_payload
    action: "mapper:"
    describe: "Build a JSON payload from inputs"
    params:
      message: "{{input.message}}"
      tag: "{{input.tag}}"
      source: cli-example
