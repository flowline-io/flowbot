name: Testing

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache: true

      - name: Go mod download
        run: go mod download

      # - name: Test
      #   run: go tool task test

      - name: Race testing
        run: go tool task test:race

      - name: BDD Acceptance Tests
        run: go tool task test:specs:ci

      - name: Upload BDD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: specs-report
          path: specs-report.xml
