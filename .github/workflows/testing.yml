name: Testing

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - '**/AGENTS.md'
      - 'README.md'
      - '**/README.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - '**/AGENTS.md'
      - 'README.md'
      - '**/README.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache: true

      - name: Go mod download
        run: go mod download

      - name: Race testing
        run: go tool task test:race

  bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache: true

      - name: Go mod download
        run: go mod download

      - name: BDD Acceptance Tests
        run: go tool task test:specs:ci

      - name: Upload BDD Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: specs-report
          path: specs-report.xml
