name: Testing

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache: true

      - name: Go mod download
        run: go mod download

      - name: Race testing
        run: go tool task test:race

  bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache: true

      - name: Go mod download
        run: go mod download

      - name: BDD Acceptance Tests
        run: go tool task test:specs:ci

      - name: Upload BDD Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: specs-report
          path: specs-report.xml

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache: true

      - name: Go mod download
        run: go mod download

      - name: E2E Browser Tests
        run: go tool task test:e2e

      - name: Upload E2E Screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-screenshots
          path: tests/e2e/test-reports/
