name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'cmd/composer/action/webdoc/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build website docs
        run: go run ./cmd/composer webdoc

      - name: Push to flowline-io/flowline-io.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: flowline-io/flowline-io.github.io
          personal_token: ${{ secrets.FLOWLINE_PAGES_TOKEN }}
          publish_dir: docs/website
          publish_branch: main
          force_orphan: true
