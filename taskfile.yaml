version: "3"
tasks:
  default:
    desc: Default task - run common checks
    cmds:
      - task: tidy
      - task: swagger
      - task: format
      - task: lint
      - task: scc
      - echo "All checks completed"

  check:
    desc: Run all security and quality checks
    cmds:
      - task: lint
      - task: secure
      - task: leak
      - task: gosec
      - echo "All checks completed"

  # Build tasks
  build:
    desc: Build flowbot server
    deps: [templ]
    cmds:
      - GOEXPERIMENT=goroutineleakprofile go build -v -o bin/flowbot ./cmd

  build:composer:
    desc: Build composer tool
    cmds:
      - go build -v -o bin/composer ./cmd/composer

  build:cli:
    desc: Build flowbot CLI
    cmds:
      - go build -v -o bin/flowbot-cli ./cmd/cli

  build:all:
    desc: Build all binaries
    cmds:
      - task: build
      - task: build:composer
      - task: build:cli

  # Run tasks
  run:
    desc: Run flowbot server
    deps: [templ]
    cmds:
      - go run -tags swagger ./cmd

  run:composer:
    desc: Run composer tool (task run:composer -- admin token create -- --help)
    cmds:
      - go run ./cmd/composer {{.CLI_ARGS}}

  run:cli:
    desc: Run flowbot CLI (task run:cli -- --help)
    cmds:
      - go run ./cmd/cli {{.CLI_ARGS}}

  # Code quality tasks
  cloc:
    desc: Count lines of code using cloc
    cmds:
      - cloc --exclude-ext=json --fullpath --not-match-d='(^|/)(node_modules|internal/store/ent/gen|docs/website/docs|cloc|docs/api|docs/skills)($|/)' .

  scc:
    desc: Generate code statistics using scc
    cmds:
      - go tool scc > ./cloc/{{ now.Format "2006-01-02" }}.txt

  lint:
    desc: Run static code analysis
    cmds:
      - go tool revive -config revive.toml -formatter friendly ./...
      - task: lint:testify
      - task: lint:action
      - task: lint:js

  lint:action:
    desc: Lint GitHub Actions workflow files
    cmds:
      - go tool actionlint

  lint:testify:
    desc: Lint usage of testify
    cmds:
      - go tool testifylint ./...

  lint:js:
    desc: Lint usage of testify
    cmds:
      - oxlint ./public

  format:
    desc: Format code (Go and other files)
    cmds:
      - go fmt ./...
      - oxfmt ./public

  tidy:
    desc: Clean up Go module dependencies
    cmds:
      - go mod tidy

  # Security tasks
  secure:
    desc: Check for Go vulnerabilities
    cmds:
      - go tool govulncheck ./...

  leak:
    desc: Find secrets with Gitleaks
    cmds:
      - go tool gitleaks git -v

  gosec:
    desc: Run Go security checker
    cmds:
      - go tool gosec ./...

  # Test tasks
  test:
    desc: Run all tests
    cmds:
      - go tool gotestsum --hide-summary=skipped --packages="./..."

  test:short:
    desc: Run tests in short mode (skip integration tests)
    cmds:
      - go test -short ./...

  test:specs:
    desc: Run Ginkgo BDD acceptance tests (parallel, requires Docker)
    cmds:
      - go tool ginkgo --procs=4 -v --randomize-all --fail-fast --tags integration ./tests/specs/...

  test:specs:ci:
    desc: Run BDD tests for CI with retry and JUnit output
    cmds:
      - go tool ginkgo --procs=4 --flake-attempts=2 --output-dir=. --poll-progress-after=30s --junit-report=specs-report.xml --tags integration ./tests/specs/...

  test:specs:serial:
    desc: Run BDD tests serially for debugging
    cmds:
      - go tool ginkgo -v --trace --tags integration ./tests/specs/...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test ./... -coverprofile=coverage.out -covermode=atomic
      - go tool cover -html=coverage.out -o coverage.html
      - echo "coverage report generated in coverage.html"

  test:race:
    desc: Race testing (all packages, default count=3)
    vars:
      COUNT: '{{.COUNT | default "3"}}'
    cmds:
      - go tool gotestsum --hide-summary=skipped -- -race -count={{.COUNT}} ./...

  test:race:ci:
    desc: Race testing for a CI shard (requires PACKAGES var)
    vars:
      COUNT: '{{.COUNT | default "3"}}'
      PACKAGES: '{{.PACKAGES}}'
    cmds:
      - go tool gotestsum --hide-summary=skipped --packages="{{.PACKAGES}}" -- -race -count={{.COUNT}}

  test:race:nightly:
    desc: Deep race scan for nightly cron
    vars:
      PACKAGES: '{{.PACKAGES}}'
    cmds:
      - task: test:race:ci
        vars:
          COUNT: "10"
          PACKAGES: '{{.PACKAGES}}'

  # Documentation tasks
  swagger:
    desc: Generate Swagger API documentation
    cmds:
      - go tool swag init -g cmd/main.go -o ./docs/api

  skills:
    desc: Generate SKILL.md under docs/skills (server imports them on startup)
    cmds:
      - go run ./cmd/composer skills

  webdoc:
    desc: Generate docs to website
    cmds:
      - go run ./cmd/composer webdoc

  # Development tools
  tools:
    desc: Install all development tools
    cmds:
      - go mod download
      - npm install -g oxfmt
      - npm install -g oxlint

  # Release tasks
  snapshot:
    desc: Create snapshot release
    cmds:
      - go tool goreleaser release --snapshot --clean

  fix:
    desc: Using go fix to modernize Go code
    cmds:
      - go fix ./...

  ent:
    desc: Generate ent code from database
    cmds:
      - go generate ./internal/store/ent/

  templ:
    desc: Generate Go code from Templ templates
    cmds:
      - go tool templ generate
