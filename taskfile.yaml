version: "3"
tasks:
  default:
    desc: Default task - run common checks
    cmds:
      - task: tidy
      - task: swagger
      - task: format
      - task: lint
      - task: test
      - task: scc
      - echo "All checks completed"

  check:
    desc: Run all security and quality checks
    cmds:
      - task: lint
      - task: secure
      - task: leak
      - task: gosec
      - echo "All checks completed"

  # Build tasks
  build:
    desc: Build flowbot server
    cmds:
      - GOEXPERIMENT=goroutineleakprofile go build -v -o bin/flowbot ./cmd

  build:composer:
    desc: Build composer tool
    cmds:
      - go build -v -o bin/composer ./cmd/composer

  build:cli:
    desc: Build flowbot CLI
    cmds:
      - go build -v -o bin/flowbot-cli ./cmd/cli

  build:docgen:
    desc: Build website documentation from markdown
    cmds:
      - go run ./cmd/composer webdoc
      - echo "website docs built"

  build:all:
    desc: Build all binaries
    cmds:
      - task: build
      - task: build:composer
      - task: build:cli

  # Run tasks
  run:
    desc: Run flowbot server
    cmds:
      - go run -tags swagger ./cmd

  run:cli:
    desc: Run flowbot CLI (task run:cli -- --help)
    cmds:
      - go run ./cmd/cli {{.CLI_ARGS}}

  # Code quality tasks
  cloc:
    desc: Count lines of code using cloc
    cmds:
      - cloc --exclude-dir=node_modules --exclude-ext=json .

  scc:
    desc: Generate code statistics using scc
    cmds:
      - go tool scc > ./cloc/{{ now.Format "2006-01-02" }}.txt

  lint:
    desc: Run static code analysis
    cmds:
      - go tool revive -config revive.toml -formatter friendly ./...
      - task: lint:action

  lint:action:
    desc: Lint GitHub Actions workflow files
    cmds:
      - go tool actionlint

  format:
    desc: Format code (Go and other files)
    cmds:
      - go fmt ./...
      - npx prettier --write .

  tidy:
    desc: Clean up Go module dependencies
    cmds:
      - go mod tidy

  # Security tasks
  secure:
    desc: Check for Go vulnerabilities
    cmds:
      - go tool govulncheck ./...

  leak:
    desc: Find secrets with Gitleaks
    cmds:
      - go tool gitleaks git -v

  gosec:
    desc: Run Go security checker
    cmds:
      - go tool gosec ./...

  # Test tasks
  test:
    desc: Run all tests
    cmds:
      - go tool gotestsum --hide-summary=skipped --packages="./..."

  test:short:
    desc: Run tests in short mode (skip integration tests)
    cmds:
      - go test -short ./...

  test:utils:
    desc: Run tests in pkg/utils package
    cmds:
      - go tool gotestsum --hide-summary=skipped --packages="./pkg/utils/..."

  test:integration:
    desc: Run integration tests with Testcontainers (requires Docker)
    cmds:
      - go test -v -tags integration -run Integration ./tests/integration/...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test ./... -coverprofile=coverage.out -covermode=atomic
      - go tool cover -html=coverage.out -o coverage.html
      - echo "coverage report generated in coverage.html"

  # Documentation tasks
  swagger:
    desc: Generate Swagger API documentation
    cmds:
      - go tool swag init -g cmd/main.go -o ./docs/api
      - go tool swag fmt -g cmd/main.go

  doc:
    desc: Generate database schema documentation
    cmds:
      - go run ./cmd/composer doc

  # Code generation tasks
  dao:
    desc: Generate DAO code from database
    cmds:
      - go run ./cmd/composer dao

  # Development tools
  tools:
    desc: Install all development tools
    cmds:
      - go mod download
      - npm install -g prettier

  # Release tasks
  snapshot:
    desc: Create snapshot release
    cmds:
      - go tool goreleaser release --snapshot --clean

  # Utility tasks
  clean:
    desc: Clean build artifacts and temporary files
    cmds:
      - go clean -cache -testcache
      - cmd: rm -rf bin/ tmp/ coverage.out coverage.html
        ignore_error: true

  air:
    desc: Run with live reload using air
    cmds:
      - air -c .air.toml
